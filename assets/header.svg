<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
  </defs>
  <rect width="320" height="320" rx="16" fill="url(#bg)"/>

  <!-- Neural network nodes -->
  <!-- Layer 1 -->
  <circle cx="60" cy="80" r="6" fill="url(#accent)" opacity="0.7"/>
  <circle cx="60" cy="140" r="6" fill="url(#accent)" opacity="0.8"/>
  <circle cx="60" cy="200" r="6" fill="url(#accent)" opacity="0.6"/>
  <circle cx="60" cy="260" r="6" fill="url(#accent)" opacity="0.7"/>

  <!-- Layer 2 -->
  <circle cx="160" cy="100" r="7" fill="url(#accent)" opacity="0.9"/>
  <circle cx="160" cy="170" r="7" fill="url(#accent)" opacity="0.85"/>
  <circle cx="160" cy="240" r="7" fill="url(#accent)" opacity="0.75"/>

  <!-- Layer 3 -->
  <circle cx="260" cy="130" r="8" fill="url(#accent)" opacity="0.95"/>
  <circle cx="260" cy="210" r="8" fill="url(#accent)" opacity="0.9"/>

  <!-- Connections L1 -> L2 -->
  <line x1="66" y1="80" x2="153" y2="100" stroke="#58a6ff" stroke-width="0.8" opacity="0.25"/>
  <line x1="66" y1="80" x2="153" y2="170" stroke="#58a6ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="66" y1="80" x2="153" y2="240" stroke="#58a6ff" stroke-width="0.8" opacity="0.1"/>
  <line x1="66" y1="140" x2="153" y2="100" stroke="#58a6ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="66" y1="140" x2="153" y2="170" stroke="#58a6ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="66" y1="140" x2="153" y2="240" stroke="#58a6ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="66" y1="200" x2="153" y2="100" stroke="#58a6ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="66" y1="200" x2="153" y2="170" stroke="#58a6ff" stroke-width="0.8" opacity="0.25"/>
  <line x1="66" y1="200" x2="153" y2="240" stroke="#58a6ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="66" y1="260" x2="153" y2="100" stroke="#58a6ff" stroke-width="0.8" opacity="0.1"/>
  <line x1="66" y1="260" x2="153" y2="170" stroke="#58a6ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="66" y1="260" x2="153" y2="240" stroke="#58a6ff" stroke-width="0.8" opacity="0.3"/>

  <!-- Connections L2 -> L3 -->
  <line x1="167" y1="100" x2="252" y2="130" stroke="#a371f7" stroke-width="0.8" opacity="0.3"/>
  <line x1="167" y1="100" x2="252" y2="210" stroke="#a371f7" stroke-width="0.8" opacity="0.15"/>
  <line x1="167" y1="170" x2="252" y2="130" stroke="#a371f7" stroke-width="0.8" opacity="0.25"/>
  <line x1="167" y1="170" x2="252" y2="210" stroke="#a371f7" stroke-width="0.8" opacity="0.25"/>
  <line x1="167" y1="240" x2="252" y2="130" stroke="#a371f7" stroke-width="0.8" opacity="0.15"/>
  <line x1="167" y1="240" x2="252" y2="210" stroke="#a371f7" stroke-width="0.8" opacity="0.3"/>

  <!-- Text -->
  <text x="160" y="38" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="4">MODELPATH</text>
  <text x="160" y="305" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9" letter-spacing="2">AI / ML ENGINEER</text>
</svg>
